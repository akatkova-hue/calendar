<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weekly Planner</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📅</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<!-- Supabase JS (powers live shared schedules; free plan is fine for personal use) -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --bg1:#fef5ff; --bg2:#eef4ff; --bg3:#fff7ec;
    --panel:#ffffff; --line:#eef0f8; --line-strong:#e3e6f2;
    --text:#2b2740; --muted:#8b8aa3; --accent:#7c5cff; --accent-2:#ff7eb6;
    --round:"Baloo 2",-apple-system,"Segoe UI",sans-serif;
    --body:"Nunito",-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    --hour-h:56px; --gutter:64px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;height:100%;}
  body{font-family:var(--body);font-weight:600;color:var(--text);
    background:linear-gradient(135deg,var(--bg1),var(--bg2) 55%,var(--bg3));
    display:flex;flex-direction:column;height:100vh;}

  header{display:flex;align-items:center;gap:12px;padding:15px 22px;flex-wrap:wrap;
    background:linear-gradient(100deg,#7c5cff,#a855f7 45%,#ff7eb6);
    box-shadow:0 4px 20px rgba(124,92,255,.28);}
  header h1{font-family:var(--round);font-size:22px;margin:0;font-weight:800;color:#fff;
    letter-spacing:.3px;text-shadow:0 1px 2px rgba(0,0,0,.12);}
  .range{color:#fff;opacity:.95;font-size:15px;font-weight:700;min-width:150px;}
  .spacer{flex:1;}
  button{font-family:var(--body);font-weight:700;cursor:pointer;border:none;
    background:rgba(255,255,255,.22);color:#fff;border-radius:14px;padding:9px 15px;
    transition:transform .1s,background .15s,box-shadow .15s;}
  button:hover{background:rgba(255,255,255,.34);transform:translateY(-1px);}
  button:active{transform:translateY(0);}
  .nav-btn{padding:9px 13px;line-height:1;font-size:18px;}
  .btn-primary{background:#fff;color:var(--accent);box-shadow:0 3px 12px rgba(0,0,0,.15);}
  .btn-primary:hover{background:#fff;box-shadow:0 6px 18px rgba(0,0,0,.22);}

  .cal-wrap{flex:1;overflow:auto;margin:14px;border-radius:22px;background:var(--panel);
    box-shadow:0 10px 40px rgba(124,92,255,.14);}
  .cal{min-width:720px;position:relative;}
  .cal-head{display:grid;grid-template-columns:var(--gutter) repeat(7,1fr);
    position:sticky;top:0;z-index:5;background:var(--panel);border-bottom:2px solid var(--line-strong);}
  .cal-head .corner{border-right:1px solid var(--line);}
  .dhead{padding:9px 6px;text-align:center;border-right:1px solid var(--line);}
  .dhead .dow{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);font-weight:800;}
  .dhead .dnum{font-family:var(--round);font-size:19px;font-weight:700;margin-top:3px;
    width:36px;height:36px;line-height:36px;border-radius:50%;display:inline-block;}
  .dhead.today .dnum{background:linear-gradient(135deg,var(--accent),var(--accent-2));color:#fff;
    box-shadow:0 3px 10px rgba(124,92,255,.4);}
  .dhead.today .dow{color:var(--accent);}

  .cal-body{display:grid;grid-template-columns:var(--gutter) repeat(7,1fr);position:relative;}
  .times{border-right:1px solid var(--line);}
  .time-slot{height:var(--hour-h);position:relative;}
  .time-slot span{position:absolute;top:-8px;right:8px;font-size:11px;color:var(--muted);font-weight:700;}
  .daycol{border-right:1px solid var(--line);position:relative;}
  .daycol:nth-child(even){background:rgba(124,92,255,.025);}
  .hour-line{height:var(--hour-h);border-bottom:1px solid var(--line);}

  .event{position:absolute;left:4px;right:4px;border-radius:14px;padding:5px 9px;overflow:hidden;
    color:#fff;font-size:12px;line-height:1.3;cursor:grab;user-select:none;
    box-shadow:0 3px 10px rgba(0,0,0,.16);z-index:2;}
  .event.dragging{opacity:.9;cursor:grabbing;z-index:20;box-shadow:0 10px 24px rgba(0,0,0,.3);transform:scale(1.02);}
  .event.cont-head{border-bottom-left-radius:5px;border-bottom-right-radius:5px;}
  .event.cont-tail{border-top-left-radius:5px;border-top-right-radius:5px;}
  .event .ev-title{font-weight:800;white-space:nowrap;text-overflow:ellipsis;overflow:hidden;}
  .event .ev-rep{font-size:11px;opacity:.85;}
  .event .ev-time{opacity:.92;font-size:11px;font-weight:700;}
  .event .ev-meta{opacity:.9;font-size:11px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .event .ev-resize{position:absolute;left:0;right:0;bottom:0;height:11px;cursor:ns-resize;border-radius:0 0 14px 14px;}
  .event .ev-resize:hover{background:rgba(255,255,255,.3);}
  .event .ev-resize::after{content:"";position:absolute;left:50%;bottom:3px;width:22px;height:3px;
    margin-left:-11px;border-radius:2px;background:rgba(255,255,255,.5);opacity:0;transition:opacity .12s;}
  .event:hover .ev-resize::after{opacity:1;}
  .event .ev-resize-top{position:absolute;left:0;right:0;top:0;height:11px;cursor:ns-resize;border-radius:14px 14px 0 0;}
  .event .ev-resize-top:hover{background:rgba(255,255,255,.3);}
  .event .ev-resize-top::after{content:"";position:absolute;left:50%;top:3px;width:22px;height:3px;
    margin-left:-11px;border-radius:2px;background:rgba(255,255,255,.5);opacity:0;transition:opacity .12s;}
  .event:hover .ev-resize-top::after{opacity:1;}
  .event.pending{opacity:.92;border:2px dashed rgba(255,255,255,.95);box-shadow:0 2px 8px rgba(0,0,0,.12);}
  .event .ev-approve{position:absolute;bottom:5px;right:5px;font-family:var(--body);font-weight:800;font-size:11px;
    background:rgba(255,255,255,.96);color:var(--text);border:none;border-radius:9px;padding:3px 9px;cursor:pointer;
    box-shadow:0 2px 6px rgba(0,0,0,.25);z-index:5;}
  .event .ev-approve:hover{background:#fff;transform:none;}

  /* Modal */
  .overlay{position:fixed;inset:0;background:rgba(43,39,64,.5);backdrop-filter:blur(3px);display:none;
    align-items:center;justify-content:center;z-index:100;}
  .overlay.open{display:flex;}
  .modal{background:var(--panel);border-radius:24px;padding:24px;width:350px;max-width:92vw;
    box-shadow:0 24px 60px rgba(43,39,64,.35);}
  .modal h2{font-family:var(--round);margin:0 0 16px;font-size:20px;font-weight:800;color:var(--accent);}
  .creator-line{font-size:12px;color:var(--muted);font-weight:700;margin:-8px 0 14px;}
  .field{margin-bottom:14px;}
  .field label{display:block;font-size:12px;color:var(--muted);margin-bottom:6px;font-weight:800;letter-spacing:.02em;}
  .field label .opt{font-weight:600;opacity:.7;}
  .field input,.field select{width:100%;padding:10px 12px;border:2px solid var(--line-strong);
    border-radius:14px;font-family:var(--body);font-weight:600;background:var(--panel);color:var(--text);
    transition:border-color .15s;}
  .field input:focus,.field select:focus{outline:none;border-color:var(--accent);}
  .colors{display:flex;gap:10px;flex-wrap:wrap;}
  .swatch{width:32px;height:32px;border-radius:50%;cursor:pointer;border:3px solid transparent;
    transition:transform .1s;box-shadow:0 2px 6px rgba(0,0,0,.15);}
  .swatch:hover{transform:scale(1.12);}
  .swatch.sel{border-color:var(--text);transform:scale(1.12);}
  .modal-actions{display:flex;gap:10px;margin-top:20px;}
  .modal-actions .spacer{flex:1;}
  .modal-actions button{color:var(--text);background:#f1f0fa;}
  .modal-actions button:hover{background:#e7e5f6;}
  .modal-actions .btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent-2));color:#fff;}
  .btn-danger{background:#ffe9ef !important;color:#e5397d !important;}
  .btn-danger:hover{background:#ffd9e5 !important;}
  .row2{display:flex;gap:10px;}
  .row2 .field{flex:1;}
  .hint{padding:9px 26px;color:var(--muted);font-size:13px;font-weight:700;
    display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;}
  .status{display:inline-flex;align-items:center;white-space:nowrap;}
  .status .dot{width:9px;height:9px;border-radius:50%;margin-right:7px;background:#c9c8d6;}
  .status.on .dot{background:#22c3a6;box-shadow:0 0 0 3px rgba(34,195,166,.2);}

  #toast{position:fixed;left:50%;bottom:28px;transform:translateX(-50%) translateY(20px);
    background:var(--text);color:#fff;padding:11px 20px;border-radius:14px;font-weight:700;font-size:14px;
    box-shadow:0 8px 24px rgba(0,0,0,.3);opacity:0;pointer-events:none;transition:opacity .2s,transform .2s;z-index:200;}
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>
  <header>
    <h1>Weekly Planner</h1>
    <button class="nav-btn" id="prevBtn" title="Previous week">‹</button>
    <button class="nav-btn" id="nextBtn" title="Next week">›</button>
    <button id="todayBtn">Today</button>
    <span class="range" id="rangeLabel"></span>
    <span class="spacer"></span>
    <button id="nameBtn">Set your name</button>
    <button id="shareBtn">Share link</button>
    <button id="reqBtn">Event request</button>
    <button class="btn-primary" id="addBtn">+ New event</button>
  </header>
  <div class="hint">
    <span>Click an empty slot to add an event · drag an event to move it · click an event to edit.</span>
    <span class="status" id="status"><span class="dot"></span><span id="statusText"></span></span>
  </div>

  <div class="cal-wrap">
    <div class="cal">
      <div class="cal-head" id="calHead"><div class="corner"></div></div>
      <div class="cal-body" id="calBody"></div>
    </div>
  </div>

  <!-- Modal -->
  <div class="overlay" id="overlay">
    <div class="modal">
      <h2 id="modalTitle">New event</h2>
      <div id="creatorLine" class="creator-line" style="display:none"></div>
      <div class="field">
        <label>Title</label>
        <input type="text" id="fTitle" placeholder="Event name" autocomplete="off">
      </div>
      <div class="field">
        <label>Date</label>
        <input type="date" id="fDate">
      </div>
      <div class="row2">
        <div class="field">
          <label>Start time</label>
          <input type="time" id="fStart" step="900">
        </div>
        <div class="field">
          <label>End time</label>
          <input type="time" id="fEnd" step="900">
        </div>
      </div>
      <div class="field">
        <label>Location <span class="opt">(optional)</span></label>
        <input type="text" id="fLoc" placeholder="e.g. Room 4, or a meeting link" autocomplete="off">
      </div>
      <div class="field">
        <label>People invited <span class="opt">(optional)</span></label>
        <input type="text" id="fInvited" placeholder="names or emails, comma-separated" autocomplete="off">
      </div>
      <div class="field">
        <label>Repeat</label>
        <select id="fRepeat">
          <option value="none">Does not repeat</option>
          <option value="daily">Every day</option>
          <option value="weekly">Every week</option>
          <option value="monthly">Every month</option>
          <option value="yearly">Every year</option>
        </select>
      </div>
      <div class="field">
        <label>Color</label>
        <div class="colors" id="colorPicker"></div>
      </div>
      <div class="modal-actions">
        <button class="btn-danger" id="deleteBtn" style="display:none">Delete</button>
        <span class="spacer"></span>
        <button id="cancelBtn">Cancel</button>
        <button class="btn-primary" id="saveBtn">Save</button>
      </div>
    </div>
  </div>

  <div id="toast"></div>

<!-- =====================================================================
     SUPABASE SETUP (for shared, live-collaborative schedules)
     ---------------------------------------------------------------------
     Until you paste your own keys below, the planner works on its own
     (events save in your browser only). To let multiple people share and
     edit ONE schedule live, do this once:

       1. Go to https://supabase.com and create a free account + project
          (the free "passion projects" plan is fine for personal use).
       2. In the project, open the "SQL Editor", paste the block below,
          and click Run. It creates the table, opens access for link-based
          sharing, and turns on realtime:

            create table if not exists events (
              id text primary key,
              schedule_id text not null,
              title text,
              date text,
              start_min int,
              dur_min int,
              color text,
              location text,
              invited text,
              repeat text,
              status text default 'confirmed',
              creator text,
              created_at timestamptz default now()
            );
            create index if not exists events_schedule_idx on events (schedule_id);
            alter table events enable row level security;
            create policy "public access" on events
              for all using (true) with check (true);
            alter publication supabase_realtime add table events;

       3. In the project, open "Project Settings > API". Copy the
          "Project URL" and the "anon public" key.
       4. Paste those two values into the object below, replacing the
          "PASTE_..." placeholders.

     Then deploy, open the site, click "Share link", and send it.
     Everyone who opens the link edits the same schedule, live.
     ===================================================================== -->
<script>
  // >>> PASTE YOUR SUPABASE VALUES HERE <<<
  window.supabaseConfig = {
    url: "https://okzkkkzbysmnmwrmdjqk.supabase.co",        // e.g. https://abcdefgh.supabase.co
    anonKey: "sb_publishable_3GMWcMgGR-whJQOROTX1tA_eIZVTwdY" // the "anon public" key (safe to expose)
  };
</script>

<script>
(function(){
  "use strict";
  const HOUR_H = 56, DAY_MIN = 24*60, SNAP = 15;
  const COLORS = ["#7c5cff","#ff7eb6","#22c3a6","#ffab3d","#ff5d73","#38bdf8","#a855f7","#facc15"];
  const DOW = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
  const MONTHS = ["January","February","March","April","May","June","July","August","September","October","November","December"];
  const STORE_KEY = "weekly-planner-events-v1";

  let events = [];
  let weekStart = startOfWeek(new Date());
  let editingId = null;
  let requestMode = false;
  let pickedColor = COLORS[0];
  let userName = ""; try{ userName = localStorage.getItem("planner-user-name")||""; }catch(e){}

  const calHead = document.getElementById("calHead");
  const calBody = document.getElementById("calBody");
  const rangeLabel = document.getElementById("rangeLabel");
  const overlay = document.getElementById("overlay");

  /* ---------- schedule id (the shareable link) ---------- */
  function randomId(){let s="";const a="abcdefghijkmnpqrstuvwxyz23456789";for(let i=0;i<16;i++)s+=a[Math.floor(Math.random()*a.length)];return s;}
  function getScheduleId(){
    let id=(location.hash||"").replace(/^#/,"").trim();
    if(!id){id=randomId();try{history.replaceState(null,"","#"+id);}catch(e){location.hash=id;}}
    return id;
  }
  const scheduleId = getScheduleId();

  /* ---------- Supabase (optional) ---------- */
  const scfg = window.supabaseConfig || {};
  const CONFIGURED = !!scfg.url && scfg.url.indexOf("PASTE")===-1 &&
                     !!scfg.anonKey && scfg.anonKey.indexOf("PASTE")===-1 &&
                     typeof supabase !== "undefined";
  let useCloud = false, db = null;
  if(CONFIGURED){
    try{ db = supabase.createClient(scfg.url, scfg.anonKey); useCloud = true; }
    catch(e){ console.error("Supabase init failed, using local-only mode:",e); useCloud=false; }
  }

  /* ---------- date helpers ---------- */
  function startOfWeek(d){const x=new Date(d);x.setHours(0,0,0,0);x.setDate(x.getDate()-x.getDay());return x;}
  function addDays(d,n){const x=new Date(d);x.setDate(x.getDate()+n);return x;}
  function ymd(d){return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");}
  function sameDay(a,b){return a.getFullYear()===b.getFullYear()&&a.getMonth()===b.getMonth()&&a.getDate()===b.getDate();}
  function fmtTime(min){let h=Math.floor(min/60),m=min%60;const ap=h<12?"AM":"PM";let hh=h%12;if(hh===0)hh=12;
    return hh+(m?":"+String(m).padStart(2,"0"):"")+" "+ap;}

  /* ---------- storage (local fallback) ---------- */
  function localKey(){return STORE_KEY+":"+scheduleId;}
  function loadLocal(){try{return JSON.parse(localStorage.getItem(localKey()))||[];}catch(e){return [];}}
  function saveLocal(){try{localStorage.setItem(localKey(),JSON.stringify(events));}catch(e){}}
  function genId(){return Date.now()+"-"+Math.random().toString(36).slice(2,7);}

  /* ---------- cloud row mapping ---------- */
  function rowToEv(r){return {id:r.id,title:r.title,date:r.date,start:r.start_min,dur:r.dur_min,color:r.color,location:r.location||"",invited:r.invited||"",repeat:r.repeat||"none",status:r.status||"confirmed",creator:r.creator||""};}
  function evToRow(id,d){return {id:id,schedule_id:scheduleId,title:d.title,date:d.date,start_min:d.start,dur_min:d.dur,color:d.color,location:d.location||null,invited:d.invited||null,repeat:d.repeat||"none",status:d.status||"confirmed",creator:d.creator||null};}

  async function fetchAll(){
    const {data,error}=await db.from("events").select("*").eq("schedule_id",scheduleId);
    if(error){console.error("Load error:",error);toast("Load error — check table & policies.");return;}
    events=(data||[]).map(rowToEv);
    renderEvents();
  }

  /* ---------- data writes (route to Supabase or localStorage) ---------- */
  function addEvent(d){
    const id=genId();
    events.push(Object.assign({id},d)); // optimistic
    if(useCloud){ db.from("events").insert(evToRow(id,d)).then(({error})=>{if(error){console.error(error);toast("Save failed.");}}); }
    else saveLocal();
  }
  function updateEvent(id,d){
    const ev=events.find(x=>x.id===id); if(ev) Object.assign(ev,d);
    if(useCloud){ db.from("events").update({title:d.title,date:d.date,start_min:d.start,dur_min:d.dur,color:d.color,location:d.location||null,invited:d.invited||null,repeat:d.repeat||"none",status:d.status||"confirmed",creator:d.creator||null}).eq("id",id).then(({error})=>{if(error)console.error(error);}); }
    else saveLocal();
  }
  function moveEvent(ev,newDate,newStart){
    ev.date=newDate; ev.start=newStart;
    if(useCloud){ db.from("events").update({date:newDate,start_min:newStart}).eq("id",ev.id).then(({error})=>{if(error)console.error(error);}); }
    else saveLocal();
    renderEvents();
  }
  function resizeEvent(ev,newDur){
    ev.dur=newDur;
    if(useCloud){ db.from("events").update({dur_min:newDur}).eq("id",ev.id).then(({error})=>{if(error)console.error(error);}); }
    else saveLocal();
    renderEvents();
  }
  function reshapeEvent(ev,newStart,newDur){
    ev.start=newStart; ev.dur=newDur;
    if(useCloud){ db.from("events").update({start_min:newStart,dur_min:newDur}).eq("id",ev.id).then(({error})=>{if(error)console.error(error);}); }
    else saveLocal();
    renderEvents();
  }
  function removeEvent(id){
    events=events.filter(x=>x.id!==id);
    if(useCloud){ db.from("events").delete().eq("id",id).then(({error})=>{if(error)console.error(error);}); }
    else saveLocal();
    renderEvents();
  }
  function approveEvent(ev){
    if(overlaps(ev.date,ev.start,ev.dur,ev.id)){ alert("Can't approve — it overlaps a confirmed event. Move it first."); return; }
    ev.status="confirmed";
    if(useCloud){ db.from("events").update({status:"confirmed"}).eq("id",ev.id).then(({error})=>{if(error)console.error(error);}); }
    else saveLocal();
    renderEvents();
  }

  /* ---------- recurrence + overlap ---------- */
  // Does event ev occur on the given YYYY-MM-DD date (accounting for repeat)?
  function occursOn(ev,dateStr){
    if(!ev.repeat||ev.repeat==="none") return ev.date===dateStr;
    const b=new Date(ev.date+"T00:00:00"), t=new Date(dateStr+"T00:00:00");
    if(t<b) return false; // recurrence starts on the event's own date
    switch(ev.repeat){
      case "daily": return true;
      case "weekly": return t.getDay()===b.getDay();
      case "monthly": return t.getDate()===b.getDate();
      case "yearly": return t.getMonth()===b.getMonth() && t.getDate()===b.getDate();
    }
    return false;
  }
  function nextDay(dateStr){return ymd(addDays(new Date(dateStr+"T00:00:00"),1));}
  function prevDay(dateStr){return ymd(addDays(new Date(dateStr+"T00:00:00"),-1));}
  // The minute-ranges an event occupies ON a given calendar day, including the
  // portion that spilled over from an occurrence the previous day (overnight events).
  function intervalsOnDay(ev,dayStr){
    const out=[]; const endAbs=ev.start+ev.dur;
    if(occursOn(ev,dayStr)) out.push([ev.start, Math.min(DAY_MIN,endAbs)]);           // same-day part
    if(endAbs>DAY_MIN && occursOn(ev,prevDay(dayStr))) out.push([0, endAbs-DAY_MIN]); // spilled from yesterday
    return out;
  }
  function rangesIntersect(a,b){ return a[0]<b[1] && b[0]<a[1]; }
  // Would an event on `date` at [start, start+dur) collide with any confirmed event?
  // Handles overnight events on either side (candidate and existing) and recurrence.
  // Pending requests don't occupy time (they only conflict once approved).
  function overlaps(date,start,dur,ignoreId){
    const endAbs=start+dur;
    const cand=[[date,[start,Math.min(DAY_MIN,endAbs)]]];
    if(endAbs>DAY_MIN) cand.push([nextDay(date),[0,endAbs-DAY_MIN]]); // candidate's after-midnight part
    return events.some(ev=>{
      if(ev.id===ignoreId || ev.status==="pending") return false;
      return cand.some(c=>intervalsOnDay(ev,c[0]).some(iv=>rangesIntersect(iv,c[1])));
    });
  }

  /* ---------- build grid ---------- */
  function buildHead(){
    calHead.innerHTML='<div class="corner"></div>';
    const today=new Date();
    for(let i=0;i<7;i++){
      const d=addDays(weekStart,i);
      const el=document.createElement("div");
      el.className="dhead"+(sameDay(d,today)?" today":"");
      el.innerHTML='<div class="dow">'+DOW[i]+'</div><div class="dnum">'+d.getDate()+'</div>';
      calHead.appendChild(el);
    }
    const end=addDays(weekStart,6);
    let label=MONTHS[weekStart.getMonth()]+" "+weekStart.getDate();
    if(weekStart.getMonth()===end.getMonth())label+=" – "+end.getDate()+", "+end.getFullYear();
    else label+=" – "+MONTHS[end.getMonth()]+" "+end.getDate()+", "+end.getFullYear();
    rangeLabel.textContent=label;
  }

  function buildBody(){
    calBody.innerHTML="";
    const times=document.createElement("div");
    times.className="times";
    for(let h=0;h<24;h++){
      const s=document.createElement("div");
      s.className="time-slot";
      if(h>0)s.innerHTML='<span>'+fmtTime(h*60)+'</span>';
      times.appendChild(s);
    }
    calBody.appendChild(times);
    for(let i=0;i<7;i++){
      const col=document.createElement("div");
      col.className="daycol";
      col.dataset.dayIndex=i;
      for(let h=0;h<24;h++){
        const hl=document.createElement("div");
        hl.className="hour-line";
        col.appendChild(hl);
      }
      col.addEventListener("click",function(e){
        if(e.target!==col && !e.target.classList.contains("hour-line"))return;
        const rect=col.getBoundingClientRect();
        let min=Math.round((e.clientY-rect.top)/HOUR_H*60/SNAP)*SNAP;
        min=Math.max(0,Math.min(DAY_MIN-SNAP,min));
        requestMode=false;openModal(null,addDays(weekStart,i),min);
      });
      calBody.appendChild(col);
    }
    renderEvents();
  }

  function dayColumns(){return Array.from(calBody.querySelectorAll(".daycol"));}

  function renderEvents(){
    calBody.querySelectorAll(".event").forEach(e=>e.remove());
    const cols=dayColumns();
    for(let i=0;i<7;i++){
      const dayStr=ymd(addDays(weekStart,i));
      const prevStr=ymd(addDays(weekStart,i-1));
      events.forEach(ev=>{
        const endAbs=ev.start+ev.dur;
        // main block on the event's own day (clipped at midnight if it spills over)
        if(occursOn(ev,dayStr)){
          const bottom=Math.min(DAY_MIN,endAbs);
          cols[i].appendChild(makeEventEl(ev, endAbs>DAY_MIN?"head":"full", ev.start, bottom-ev.start));
        }
        // continuation block: the part that spilled past midnight from the previous day
        if(endAbs>DAY_MIN && occursOn(ev,prevStr)){
          cols[i].appendChild(makeEventEl(ev, "tail", 0, endAbs-DAY_MIN));
        }
      });
    }
  }

  function makeEventEl(ev,part,topMin,heightMin){
    part=part||"full";
    const el=document.createElement("div");
    el.className="event"+(part==="head"?" cont-head":part==="tail"?" cont-tail":"");
    el.style.background=ev.color;
    el.style.top=(topMin/60*HOUR_H)+"px";
    el.style.height=Math.max(18,(heightMin/60*HOUR_H)-2)+"px";
    el.dataset.id=ev.id;
    const endAbs=ev.start+ev.dur;
    const rep=(ev.repeat&&ev.repeat!=="none")?' <span class="ev-rep" title="Repeats '+ev.repeat+'">↻</span>':'';
    const cont=part==="tail"?' <span class="ev-rep">(cont.)</span>':'';
    let html='<div class="ev-title">'+escapeHtml(ev.title||"Untitled")+rep+cont+'</div>';
    if(heightMin>=30) html+='<div class="ev-time">'+fmtTime(ev.start)+' – '+fmtTime(endAbs%DAY_MIN)+'</div>';
    if(ev.location && heightMin>=60) html+='<div class="ev-meta">'+escapeHtml(ev.location)+'</div>';
    if(ev.invited && heightMin>=90) html+='<div class="ev-meta">with '+escapeHtml(ev.invited)+'</div>';
    if(ev.creator && heightMin>=75) html+='<div class="ev-meta">by '+escapeHtml(ev.creator)+'</div>';
    el.innerHTML=html;
    if(ev.status==="pending") el.classList.add("pending");
    // resize handles: bottom on the block with the true end, top on the block with the start
    if(part==="full"||part==="tail"){
      const rz=document.createElement("div");rz.className="ev-resize";el.appendChild(rz);
      attachResize(rz,ev,part);
    }
    if(part==="full"||part==="head"){
      const rzt=document.createElement("div");rzt.className="ev-resize-top";el.appendChild(rzt);
      attachResizeTop(rzt,ev,part);
    }
    if(part==="tail"){
      el.style.cursor="pointer";
      el.addEventListener("click",function(e){ if(e.target.classList.contains("ev-resize"))return; openModal(ev); });
    }else{
      attachDrag(el,ev); // drag body to move; a plain click opens edit
    }
    // pending requests also get an Approve button (moving/resizing works like a real event)
    if(ev.status==="pending" && part!=="tail"){
      const ab=document.createElement("button");ab.className="ev-approve";ab.textContent="✓ Approve";
      ab.addEventListener("pointerdown",function(e){e.stopPropagation();});
      ab.addEventListener("click",function(e){e.stopPropagation();approveEvent(ev);});
      el.appendChild(ab);
    }
    return el;
  }

  function escapeHtml(s){return String(s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));}

  /* ---------- drag to move ---------- */
  function attachDrag(el,ev){
    let dragging=false,moved=false,startX,startY,grabOffset;
    el.addEventListener("pointerdown",function(e){
      if(e.button!==0)return;
      startX=e.clientX;startY=e.clientY;moved=false;
      const rect=el.getBoundingClientRect();
      grabOffset=e.clientY-rect.top;
      el.setPointerCapture(e.pointerId);
      dragging=true;
      el.classList.add("dragging");
      e.stopPropagation();
    });
    el.addEventListener("pointermove",function(e){
      if(!dragging)return;
      if(Math.abs(e.clientX-startX)>3||Math.abs(e.clientY-startY)>3)moved=true;
      const cols=dayColumns();
      let target=null,dayIdx=0;
      cols.forEach((c,i)=>{const r=c.getBoundingClientRect();
        if(e.clientX>=r.left&&e.clientX<r.right){target=c;dayIdx=i;}});
      if(!target){target=cols[dayIdx];}
      const r=target.getBoundingClientRect();
      let min=Math.round((e.clientY-grabOffset-r.top)/HOUR_H*60/SNAP)*SNAP;
      min=Math.max(0,Math.min(DAY_MIN-SNAP,min));
      el._pendingDay=dayIdx;el._pendingMin=min;
      if(el.parentElement!==target)target.appendChild(el);
      el.style.top=(min/60*HOUR_H)+"px";
    });
    el.addEventListener("pointerup",function(e){
      if(!dragging)return;
      dragging=false;el.classList.remove("dragging");
      if(moved&&el._pendingDay!=null){
        const newDate=ymd(addDays(weekStart,el._pendingDay));
        if(ev.status!=="pending" && overlaps(newDate,el._pendingMin,ev.dur,ev.id)){
          renderEvents(); // would overlap another event: snap back
        }else{
          moveEvent(ev,newDate,el._pendingMin);
        }
      }else if(!moved){
        openModal(ev);
      }
    });
  }

  /* ---------- drag bottom edge to resize (change length) ---------- */
  function attachResize(handle,ev,part){
    let resizing=false,colRect=null,pendingDur=ev.dur;
    handle.addEventListener("pointerdown",function(e){
      if(e.button!==0)return;
      e.stopPropagation(); // don't start a move-drag
      resizing=true;pendingDur=ev.dur;
      const col=handle.closest(".daycol");
      colRect=col?col.getBoundingClientRect():null;
      try{handle.setPointerCapture(e.pointerId);}catch(_){}
      handle.parentElement.classList.add("dragging");
    });
    handle.addEventListener("pointermove",function(e){
      if(!resizing||!colRect)return;
      e.stopPropagation();
      let mins=Math.round((e.clientY-colRect.top)/HOUR_H*60/SNAP)*SNAP;
      if(part==="tail"){
        // dragging the overnight continuation: end lands in the next day
        let tail=Math.max(SNAP,Math.min(DAY_MIN,mins));
        pendingDur=(DAY_MIN-ev.start)+tail;
        handle.parentElement.style.height=Math.max(18,(tail/60*HOUR_H)-2)+"px";
      }else{
        let nd=mins-ev.start;
        nd=Math.max(SNAP,Math.min(DAY_MIN-ev.start,nd));
        pendingDur=nd;
        handle.parentElement.style.height=Math.max(18,(nd/60*HOUR_H)-2)+"px";
      }
    });
    handle.addEventListener("pointerup",function(e){
      if(!resizing)return;
      e.stopPropagation();
      resizing=false;
      handle.parentElement.classList.remove("dragging");
      if(pendingDur && pendingDur!==ev.dur){
        if(ev.status!=="pending" && part!=="tail" && overlaps(ev.date,ev.start,pendingDur,ev.id)){ renderEvents(); } // would overlap: snap back
        else { resizeEvent(ev,pendingDur); }
      }
    });
  }

  /* ---------- drag top edge to resize (change start time) ---------- */
  function attachResizeTop(handle,ev,part){
    let resizing=false,colRect=null,oldEnd=ev.start+ev.dur,pStart=ev.start,pDur=ev.dur;
    handle.addEventListener("pointerdown",function(e){
      if(e.button!==0)return;
      e.stopPropagation();
      resizing=true;oldEnd=ev.start+ev.dur;pStart=ev.start;pDur=ev.dur;
      const col=handle.closest(".daycol");
      colRect=col?col.getBoundingClientRect():null;
      try{handle.setPointerCapture(e.pointerId);}catch(_){}
      handle.parentElement.classList.add("dragging");
    });
    handle.addEventListener("pointermove",function(e){
      if(!resizing||!colRect)return;
      e.stopPropagation();
      let mins=Math.round((e.clientY-colRect.top)/HOUR_H*60/SNAP)*SNAP;
      let ns=Math.max(0,Math.min(oldEnd-SNAP,Math.min(DAY_MIN-SNAP,mins)));
      pStart=ns;pDur=oldEnd-ns;
      const disp=Math.min(DAY_MIN,oldEnd)-ns;
      handle.parentElement.style.top=(ns/60*HOUR_H)+"px";
      handle.parentElement.style.height=Math.max(18,(disp/60*HOUR_H)-2)+"px";
    });
    handle.addEventListener("pointerup",function(e){
      if(!resizing)return;
      e.stopPropagation();
      resizing=false;
      handle.parentElement.classList.remove("dragging");
      if(pStart!==ev.start || pDur!==ev.dur){
        if(ev.status!=="pending" && overlaps(ev.date,pStart,pDur,ev.id)){ renderEvents(); } // would overlap: snap back
        else { reshapeEvent(ev,pStart,pDur); }
      }
    });
  }

  /* ---------- modal ---------- */
  const colorPicker=document.getElementById("colorPicker");
  COLORS.forEach(c=>{
    const sw=document.createElement("div");
    sw.className="swatch";sw.style.background=c;sw.dataset.color=c;
    sw.addEventListener("click",()=>{pickedColor=c;syncSwatches();});
    colorPicker.appendChild(sw);
  });
  function syncSwatches(){colorPicker.querySelectorAll(".swatch").forEach(s=>
    s.classList.toggle("sel",s.dataset.color===pickedColor));}

  function openModal(ev,presetDate,presetMin){
    editingId=ev?ev.id:null;
    if(ev) requestMode=false;
    document.getElementById("modalTitle").textContent=ev?"Edit event":(requestMode?"New event request":"New event");
    const cl=document.getElementById("creatorLine");
    if(ev && ev.creator){ cl.style.display="block"; cl.textContent="Created by "+ev.creator; }
    else { cl.style.display="none"; cl.textContent=""; }
    document.getElementById("deleteBtn").style.display=ev?"inline-block":"none";
    document.getElementById("fTitle").value=ev?ev.title:"";
    document.getElementById("fDate").value=ev?ev.date:ymd(presetDate||addDays(weekStart,new Date().getDay()));
    const startMin=ev?ev.start:(presetMin!=null?presetMin:9*60);
    const endMin=ev?(ev.start+ev.dur):Math.min(startMin+60,23*60+45);
    document.getElementById("fStart").value=toHM(startMin%DAY_MIN);
    document.getElementById("fEnd").value=toHM(endMin%DAY_MIN);
    document.getElementById("fLoc").value=ev&&ev.location?ev.location:"";
    document.getElementById("fInvited").value=ev&&ev.invited?ev.invited:"";
    document.getElementById("fRepeat").value=ev&&ev.repeat?ev.repeat:"none";
    pickedColor=ev?ev.color:COLORS[Math.floor(Math.random()*COLORS.length)];
    syncSwatches();
    overlay.classList.add("open");
    setTimeout(()=>document.getElementById("fTitle").focus(),50);
  }
  function closeModal(){overlay.classList.remove("open");editingId=null;}

  function parseTime(v){const [h,m]=v.split(":").map(Number);return h*60+(m||0);}
  function toHM(min){return String(Math.floor(min/60)).padStart(2,"0")+":"+String(min%60).padStart(2,"0");}

  document.getElementById("saveBtn").addEventListener("click",function(){
    const title=document.getElementById("fTitle").value.trim();
    const date=document.getElementById("fDate").value;
    const start=parseTime(document.getElementById("fStart").value||"09:00");
    const end=parseTime(document.getElementById("fEnd").value||"10:00");
    const location=document.getElementById("fLoc").value.trim();
    const invited=document.getElementById("fInvited").value.trim();
    const repeat=document.getElementById("fRepeat").value;
    if(!date){alert("Please choose a date.");return;}
    if(end===start){alert("Start and end time can't be the same.");return;}
    let dur=end-start;
    if(dur<0) dur+=DAY_MIN; // ends the next day (overnight event)
    let status,creator;
    if(editingId){ const ex=events.find(x=>x.id===editingId)||{}; status=ex.status||"confirmed"; creator=ex.creator||""; }
    else { status=requestMode?"pending":"confirmed"; if(!userName) promptName(); creator=userName; }
    if(status!=="pending" && overlaps(date,start,dur,editingId)){
      alert("That time overlaps another event. Please pick a free time slot.");return;
    }
    if(editingId){
      updateEvent(editingId,{title,date,start,dur,color:pickedColor,location,invited,repeat,status,creator});
    }else{
      addEvent({title,date,start,dur,color:pickedColor,location,invited,repeat,status,creator});
    }
    closeModal();
    weekStart=startOfWeek(new Date(date+"T00:00:00"));
    buildHead();buildBody();
  });
  document.getElementById("deleteBtn").addEventListener("click",function(){
    if(editingId) removeEvent(editingId);
    closeModal();
  });
  document.getElementById("cancelBtn").addEventListener("click",closeModal);
  overlay.addEventListener("click",e=>{if(e.target===overlay)closeModal();});
  document.addEventListener("keydown",e=>{
    if(!overlay.classList.contains("open"))return;
    const ae=document.activeElement;
    const typing=ae&&(ae.tagName==="INPUT"||ae.tagName==="SELECT"||ae.tagName==="TEXTAREA");
    if(e.key==="Escape"){closeModal();}
    else if(e.key==="Enter"){e.preventDefault();document.getElementById("saveBtn").click();}
    else if((e.key==="Delete"||e.key==="Backspace") && editingId && !typing){
      e.preventDefault();document.getElementById("deleteBtn").click();
    }
  });

  /* ---------- share ---------- */
  let toastTimer=null;
  function toast(msg){
    const t=document.getElementById("toast");
    t.textContent=msg;t.classList.add("show");
    clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.classList.remove("show"),2400);
  }
  document.getElementById("shareBtn").addEventListener("click",function(){
    const url=location.href;
    if(navigator.clipboard&&navigator.clipboard.writeText){
      navigator.clipboard.writeText(url).then(()=>toast(useCloud?"Link copied! Anyone with it can edit this schedule.":"Link copied!"))
        .catch(()=>window.prompt("Copy this link:",url));
    }else{window.prompt("Copy this link:",url);}
  });

  /* ---------- name / who created events ---------- */
  function updateNameBtn(){ document.getElementById("nameBtn").textContent = userName ? ("You: "+userName) : "Set your name"; }
  function promptName(){
    const n=window.prompt("Your name (shown on events you create):", userName||"");
    if(n!=null){ userName=String(n).trim(); try{localStorage.setItem("planner-user-name",userName);}catch(e){} updateNameBtn(); }
  }
  document.getElementById("nameBtn").addEventListener("click",promptName);

  /* ---------- status ---------- */
  function updateStatus(){
    const s=document.getElementById("status");
    const txt=document.getElementById("statusText");
    if(useCloud){s.classList.add("on");txt.textContent="Live sharing on — anyone with the link can edit";}
    else{s.classList.remove("on");txt.textContent="Solo mode — add Supabase keys to share & collaborate";}
  }

  /* ---------- nav & add ---------- */
  document.getElementById("prevBtn").addEventListener("click",()=>{weekStart=addDays(weekStart,-7);buildHead();buildBody();});
  document.getElementById("nextBtn").addEventListener("click",()=>{weekStart=addDays(weekStart,7);buildHead();buildBody();});
  document.getElementById("todayBtn").addEventListener("click",()=>{weekStart=startOfWeek(new Date());buildHead();buildBody();});
  document.getElementById("addBtn").addEventListener("click",()=>{requestMode=false;openModal(null);});
  document.getElementById("reqBtn").addEventListener("click",()=>{requestMode=true;openModal(null);});

  /* ---------- init ---------- */
  if(!useCloud){events=loadLocal();}
  buildHead();buildBody();
  updateStatus();
  updateNameBtn();
  if(!userName) promptName();
  if(useCloud){
    fetchAll();
    db.channel("schedule-"+scheduleId)
      .on("postgres_changes",
          {event:"*",schema:"public",table:"events",filter:"schedule_id=eq."+scheduleId},
          function(){ fetchAll(); })
      .subscribe();
  }
  document.querySelector(".cal-wrap").scrollTop=7*HOUR_H;
})();
</script>
</body>
</html>
